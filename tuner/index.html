<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ENS Sound Tuner</title>
  <link rel="stylesheet" href="src/style.css" />
</head>
<body>
  <main>
    <h1>ENS Sound Tuner</h1>
    <p class="sub">List of names — one per line. Click any line to make it the current one. Twiddle knobs and listen.</p>

    <div class="row name-row">
      <textarea id="names" rows="7" autocomplete="off" autocapitalize="off" spellcheck="false"></textarea>
      <div class="name-row-buttons">
        <button id="play" class="primary">▶ Play</button>
        <button id="stop">■ Stop</button>
        <button id="play-all">▶ Play all</button>
        <button id="midi" class="midi-btn">MIDI</button>
        <button id="midi-export" class="small">Export mapping</button>
        <button id="midi-import" class="small">Import mapping</button>
      </div>
    </div>

    <div id="char-viz" class="char-viz" aria-hidden="true"></div>
    <canvas id="test-canvas" class="scope" width="1200" height="140" aria-hidden="true"></canvas>

    <div class="panels">

      <section class="panel">
        <h2>Scale &amp; Tempo</h2>

        <div class="field toggle">
          <label for="loop-enabled">Loop</label>
          <input id="loop-enabled" type="checkbox" />
        </div>

        <div class="field toggle">
          <label for="lock-scale">Lock scale</label>
          <input id="lock-scale" type="checkbox" />
        </div>
        <div class="field">
          <label for="locked-scale">Scale</label>
          <input id="locked-scale" type="text" list="scale-suggestions" autocomplete="off" placeholder="(auto from name)" />
          <span class="val"></span>
        </div>
        <datalist id="scale-suggestions"></datalist>

        <div class="field">
          <label for="locked-cpm">CPM</label>
          <input id="locked-cpm" type="range" min="40" max="400" step="1" />
          <span class="val" id="locked-cpm-val"></span>
        </div>

        <div class="field">
          <label for="sub-sizes">Subdivision sizes</label>
          <input id="sub-sizes" type="text" placeholder="2 3 4" autocomplete="off" />
          <span class="val"></span>
        </div>
        <div class="field">
          <label for="sub-step">Subdivision step</label>
          <input id="sub-step" type="range" min="0" max="16" step="1" />
          <span class="val" id="sub-step-val"></span>
        </div>
        <div class="field">
          <label for="note-offset">Note offset</label>
          <input id="note-offset" type="range" min="-24" max="24" step="1" />
          <span class="val" id="note-offset-val"></span>
        </div>
        <div class="field">
          <label for="high-nibble-offset">High nibble offset</label>
          <input id="high-nibble-offset" type="range" min="-24" max="24" step="1" />
          <span class="val" id="high-nibble-offset-val"></span>
        </div>
        <div class="field">
          <label for="low-nibble-offset">Low nibble offset</label>
          <input id="low-nibble-offset" type="range" min="-24" max="24" step="1" />
          <span class="val" id="low-nibble-offset-val"></span>
        </div>
        <div class="field toggle">
          <label for="start-from-zero">Start from 0</label>
          <input id="start-from-zero" type="checkbox" />
        </div>
      </section>

      <section class="panel">
        <h2>Lead</h2>
        <div class="field toggle">
          <label for="lead-enabled">Enabled</label>
          <input id="lead-enabled" type="checkbox" />
        </div>
        <div class="field">
          <label for="lead-synth">Synth</label>
          <select id="lead-synth"></select>
          <span class="val"></span>
        </div>
        <div class="adsr-grid">
          <div class="cell">
            <label>A</label>
            <input id="lead-a" type="range" min="0" max="2" step="0.01" />
            <span class="val" id="lead-a-val"></span>
          </div>
          <div class="cell">
            <label>D</label>
            <input id="lead-d" type="range" min="0" max="2" step="0.01" />
            <span class="val" id="lead-d-val"></span>
          </div>
          <div class="cell">
            <label>S</label>
            <input id="lead-s" type="range" min="0" max="2" step="0.01" />
            <span class="val" id="lead-s-val"></span>
          </div>
          <div class="cell">
            <label>R</label>
            <input id="lead-r" type="range" min="0" max="3" step="0.01" />
            <span class="val" id="lead-r-val"></span>
          </div>
        </div>
        <div class="field" style="margin-top:10px">
          <label for="lead-gain">Gain</label>
          <input id="lead-gain" type="range" min="0" max="1" step="0.01" />
          <span class="val" id="lead-gain-val"></span>
        </div>
        <div class="field">
          <label for="lead-lpf">LPF (Hz)</label>
          <input id="lead-lpf" type="range" min="100" max="20000" step="50" />
          <span class="val" id="lead-lpf-val"></span>
        </div>
        <div class="field">
          <label for="lead-hpf">HPF (Hz)</label>
          <input id="lead-hpf" type="range" min="0" max="2000" step="10" />
          <span class="val" id="lead-hpf-val"></span>
        </div>
        <div class="field">
          <label for="lead-lpq">Resonance (Q)</label>
          <input id="lead-lpq" type="range" min="0" max="30" step="0.5" />
          <span class="val" id="lead-lpq-val"></span>
        </div>
        <div class="field">
          <label for="lead-shape">Drive</label>
          <input id="lead-shape" type="range" min="0" max="1" step="0.01" />
          <span class="val" id="lead-shape-val"></span>
        </div>
        <div class="field">
          <label for="lead-bpf">Bandpass (Hz)</label>
          <input id="lead-bpf" type="range" min="0" max="20000" step="50" />
          <span class="val" id="lead-bpf-val"></span>
        </div>
        <div class="field">
          <label for="lead-bpq">BP Q</label>
          <input id="lead-bpq" type="range" min="0" max="30" step="0.5" />
          <span class="val" id="lead-bpq-val"></span>
        </div>
        <div class="field">
          <label for="lead-vib">Vibrato (Hz)</label>
          <input id="lead-vib" type="range" min="0" max="32" step="0.1" />
          <span class="val" id="lead-vib-val"></span>
        </div>
        <div class="field">
          <label for="lead-detune">Detune</label>
          <input id="lead-detune" type="range" min="-1" max="1" step="0.01" />
          <span class="val" id="lead-detune-val"></span>
        </div>
        <div class="field">
          <label for="lead-fm">FM index</label>
          <input id="lead-fm" type="range" min="0" max="8" step="0.1" />
          <span class="val" id="lead-fm-val"></span>
        </div>
        <div class="field">
          <label for="lead-fmh">FM ratio</label>
          <input id="lead-fmh" type="range" min="0" max="8" step="0.1" />
          <span class="val" id="lead-fmh-val"></span>
        </div>
      </section>

      <section class="panel">
        <h2>Pad</h2>
        <div class="field toggle">
          <label for="pad-enabled">Enabled</label>
          <input id="pad-enabled" type="checkbox" />
        </div>
        <div class="field">
          <label for="pad-synth">Synth</label>
          <select id="pad-synth"></select>
          <span class="val"></span>
        </div>
        <div class="adsr-grid">
          <div class="cell">
            <label>A</label>
            <input id="pad-a" type="range" min="0" max="2" step="0.01" />
            <span class="val" id="pad-a-val"></span>
          </div>
          <div class="cell">
            <label>D</label>
            <input id="pad-d" type="range" min="0" max="2" step="0.01" />
            <span class="val" id="pad-d-val"></span>
          </div>
          <div class="cell">
            <label>S</label>
            <input id="pad-s" type="range" min="0" max="5" step="0.01" />
            <span class="val" id="pad-s-val"></span>
          </div>
          <div class="cell">
            <label>R</label>
            <input id="pad-r" type="range" min="0" max="3" step="0.01" />
            <span class="val" id="pad-r-val"></span>
          </div>
        </div>
        <div class="field" style="margin-top:10px">
          <label for="pad-gain">Gain</label>
          <input id="pad-gain" type="range" min="0" max="1" step="0.01" />
          <span class="val" id="pad-gain-val"></span>
        </div>
        <div class="field">
          <label for="pad-lpf">LPF (Hz)</label>
          <input id="pad-lpf" type="range" min="100" max="20000" step="50" />
          <span class="val" id="pad-lpf-val"></span>
        </div>
        <div class="field">
          <label for="pad-hpf">HPF (Hz)</label>
          <input id="pad-hpf" type="range" min="0" max="2000" step="10" />
          <span class="val" id="pad-hpf-val"></span>
        </div>
        <div class="field">
          <label for="pad-lpq">Resonance (Q)</label>
          <input id="pad-lpq" type="range" min="0" max="30" step="0.5" />
          <span class="val" id="pad-lpq-val"></span>
        </div>
        <div class="field">
          <label for="pad-shape">Drive</label>
          <input id="pad-shape" type="range" min="0" max="1" step="0.01" />
          <span class="val" id="pad-shape-val"></span>
        </div>
        <div class="field">
          <label for="pad-bpf">Bandpass (Hz)</label>
          <input id="pad-bpf" type="range" min="0" max="20000" step="50" />
          <span class="val" id="pad-bpf-val"></span>
        </div>
        <div class="field">
          <label for="pad-bpq">BP Q</label>
          <input id="pad-bpq" type="range" min="0" max="30" step="0.5" />
          <span class="val" id="pad-bpq-val"></span>
        </div>
        <div class="field">
          <label for="pad-vib">Vibrato (Hz)</label>
          <input id="pad-vib" type="range" min="0" max="32" step="0.1" />
          <span class="val" id="pad-vib-val"></span>
        </div>
        <div class="field">
          <label for="pad-detune">Detune</label>
          <input id="pad-detune" type="range" min="-1" max="1" step="0.01" />
          <span class="val" id="pad-detune-val"></span>
        </div>
        <div class="field">
          <label for="pad-fm">FM index</label>
          <input id="pad-fm" type="range" min="0" max="8" step="0.1" />
          <span class="val" id="pad-fm-val"></span>
        </div>
        <div class="field">
          <label for="pad-fmh">FM ratio</label>
          <input id="pad-fmh" type="range" min="0" max="8" step="0.1" />
          <span class="val" id="pad-fmh-val"></span>
        </div>
      </section>

      <section class="panel">
        <h2>Drone (shared)</h2>
        <p class="sub" style="margin-top:0">A low sine root tone — the &ldquo;ENS voice&rdquo; signature underneath every name.</p>
        <div class="field toggle">
          <label for="drone-enabled">Enabled</label>
          <input id="drone-enabled" type="checkbox" />
        </div>
        <div class="field">
          <label for="drone-gain">Gain</label>
          <input id="drone-gain" type="range" min="0" max="1" step="0.01" />
          <span class="val" id="drone-gain-val"></span>
        </div>
        <div class="field">
          <label for="drone-semitones">Tone (semitones)</label>
          <input id="drone-semitones" type="range" min="-36" max="36" step="1" />
          <span class="val" id="drone-semitones-val"></span>
        </div>
        <div class="field">
          <label for="drone-lpf">LPF (Hz)</label>
          <input id="drone-lpf" type="range" min="100" max="20000" step="50" />
          <span class="val" id="drone-lpf-val"></span>
        </div>
        <div class="field">
          <label for="drone-hpf">HPF (Hz)</label>
          <input id="drone-hpf" type="range" min="0" max="2000" step="10" />
          <span class="val" id="drone-hpf-val"></span>
        </div>
        <div class="field">
          <label for="drone-lpq">Resonance (Q)</label>
          <input id="drone-lpq" type="range" min="0" max="30" step="0.5" />
          <span class="val" id="drone-lpq-val"></span>
        </div>
        <div class="field">
          <label for="drone-shape">Drive</label>
          <input id="drone-shape" type="range" min="0" max="1" step="0.01" />
          <span class="val" id="drone-shape-val"></span>
        </div>
        <div class="field">
          <label for="drone-bpf">Bandpass (Hz)</label>
          <input id="drone-bpf" type="range" min="0" max="20000" step="50" />
          <span class="val" id="drone-bpf-val"></span>
        </div>
        <div class="field">
          <label for="drone-bpq">BP Q</label>
          <input id="drone-bpq" type="range" min="0" max="30" step="0.5" />
          <span class="val" id="drone-bpq-val"></span>
        </div>
        <div class="field">
          <label for="drone-vib">Vibrato (Hz)</label>
          <input id="drone-vib" type="range" min="0" max="32" step="0.1" />
          <span class="val" id="drone-vib-val"></span>
        </div>
        <div class="field">
          <label for="drone-detune">Detune</label>
          <input id="drone-detune" type="range" min="-1" max="1" step="0.01" />
          <span class="val" id="drone-detune-val"></span>
        </div>
        <div class="field">
          <label for="drone-fm">FM index</label>
          <input id="drone-fm" type="range" min="0" max="8" step="0.1" />
          <span class="val" id="drone-fm-val"></span>
        </div>
        <div class="field">
          <label for="drone-fmh">FM ratio</label>
          <input id="drone-fmh" type="range" min="0" max="8" step="0.1" />
          <span class="val" id="drone-fmh-val"></span>
        </div>
      </section>

      <section class="panel">
        <h2>Aux</h2>
        <div class="field toggle">
          <label for="aux-enabled">Enabled</label>
          <input id="aux-enabled" type="checkbox" />
        </div>
        <div class="field">
          <label for="aux-synth">Synth</label>
          <select id="aux-synth"></select>
          <span class="val"></span>
        </div>
        <div class="adsr-grid">
          <div class="cell">
            <label>A</label>
            <input id="aux-a" type="range" min="0" max="2" step="0.01" />
            <span class="val" id="aux-a-val"></span>
          </div>
          <div class="cell">
            <label>D</label>
            <input id="aux-d" type="range" min="0" max="2" step="0.01" />
            <span class="val" id="aux-d-val"></span>
          </div>
          <div class="cell">
            <label>S</label>
            <input id="aux-s" type="range" min="0" max="5" step="0.01" />
            <span class="val" id="aux-s-val"></span>
          </div>
          <div class="cell">
            <label>R</label>
            <input id="aux-r" type="range" min="0" max="3" step="0.01" />
            <span class="val" id="aux-r-val"></span>
          </div>
        </div>
        <div class="field" style="margin-top:10px">
          <label for="aux-gain">Gain</label>
          <input id="aux-gain" type="range" min="0" max="1" step="0.01" />
          <span class="val" id="aux-gain-val"></span>
        </div>
        <div class="field">
          <label for="aux-semitones">Tone (semitones)</label>
          <input id="aux-semitones" type="range" min="-36" max="36" step="1" />
          <span class="val" id="aux-semitones-val"></span>
        </div>
        <div class="field">
          <label for="aux-lpf">LPF (Hz)</label>
          <input id="aux-lpf" type="range" min="100" max="20000" step="50" />
          <span class="val" id="aux-lpf-val"></span>
        </div>
        <div class="field">
          <label for="aux-hpf">HPF (Hz)</label>
          <input id="aux-hpf" type="range" min="0" max="2000" step="10" />
          <span class="val" id="aux-hpf-val"></span>
        </div>
        <div class="field">
          <label for="aux-lpq">Resonance (Q)</label>
          <input id="aux-lpq" type="range" min="0" max="30" step="0.5" />
          <span class="val" id="aux-lpq-val"></span>
        </div>
        <div class="field">
          <label for="aux-shape">Drive</label>
          <input id="aux-shape" type="range" min="0" max="1" step="0.01" />
          <span class="val" id="aux-shape-val"></span>
        </div>
        <div class="field">
          <label for="aux-bpf">Bandpass (Hz)</label>
          <input id="aux-bpf" type="range" min="0" max="20000" step="50" />
          <span class="val" id="aux-bpf-val"></span>
        </div>
        <div class="field">
          <label for="aux-bpq">BP Q</label>
          <input id="aux-bpq" type="range" min="0" max="30" step="0.5" />
          <span class="val" id="aux-bpq-val"></span>
        </div>
        <div class="field">
          <label for="aux-vib">Vibrato (Hz)</label>
          <input id="aux-vib" type="range" min="0" max="32" step="0.1" />
          <span class="val" id="aux-vib-val"></span>
        </div>
        <div class="field">
          <label for="aux-detune">Detune</label>
          <input id="aux-detune" type="range" min="-1" max="1" step="0.01" />
          <span class="val" id="aux-detune-val"></span>
        </div>
        <div class="field">
          <label for="aux-fm">FM index</label>
          <input id="aux-fm" type="range" min="0" max="8" step="0.1" />
          <span class="val" id="aux-fm-val"></span>
        </div>
        <div class="field">
          <label for="aux-fmh">FM ratio</label>
          <input id="aux-fmh" type="range" min="0" max="8" step="0.1" />
          <span class="val" id="aux-fmh-val"></span>
        </div>
      </section>

      <section class="panel">
        <h2>Master FX</h2>
        <div class="field">
          <label for="master-room">Reverb</label>
          <input id="master-room" type="range" min="0" max="1" step="0.01" />
          <span class="val" id="master-room-val"></span>
        </div>
        <div class="field">
          <label for="master-delay">Delay</label>
          <input id="master-delay" type="range" min="0" max="1" step="0.01" />
          <span class="val" id="master-delay-val"></span>
        </div>
      </section>

    </div>

    <section class="panel code-panel">
      <header>
        <h2>Generated Strudel</h2>
        <div class="actions">
          <button id="export-defaults">Copy as defaults</button>
          <button id="reset-state" class="danger">Reset to file defaults</button>
          <button id="reset" class="danger">Reset to generated</button>
        </div>
      </header>
      <textarea id="code" spellcheck="false"></textarea>
      <div id="status" class="status"></div>
    </section>

  </main>

  <script type="module" src="src/app.js"></script>
</body>
</html>
